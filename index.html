<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Majara</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.hidden { display: none; }

.page1-box p { font-size: 30px; opacity: 0.9; }

a { text-decoration: none; color: white; }

.big-title {
    font-size: 55px;
    margin-bottom: 15px;
    opacity: 0.85;
    text-shadow: 0 0 8px rgba(255,255,255,0.6),
                 0 0 16px rgba(255,255,255,0.4);
}

.page2-bg {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: #000000;
    background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -1;
}

.image-box {
    width: fit-content;
    height: fit-content;
    border: 3px solid #696969;
    margin: 0 auto 10px;
}

.image-box img {
    display: block;
    max-width: 100%;
    height: auto;
}

.box-gray {
    width: 500px;
    min-height: 200px;
    padding: 25px;
    border-radius: 8px;
    margin: 30px auto;
    text-align: left;
    border: 1px solid rgba(255,255,255,0.2);
}

.top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 15px;
}

.dots { display: flex; gap: 6px; }

.dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid gray;
}

.discord-link { color: white; opacity: 0.9; font-size: 16px; }

.line { height: 1px; background: gray; margin: 15px 0; }

.top-left-panel {
    position: fixed; top: 20px; left: 20px;
    width: 260px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 16px;
    border-radius: 8px;
    text-align: center;
}

.top-left-panel .title-inline {
    font-size: 14px;
    display: inline-block;
    white-space: nowrap;
    margin-bottom: 18px;
}

.inner-box {
    background: rgba(87, 84, 84, 0.6);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 18px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
}

.inner-box .green-text {
    color: #00ff88;
    font-size: 13px;
    font-family: Arial, sans-serif;
}

.panel-line { height: 1px; background: rgba(255,255,255,0.2); margin: 16px 0; }

.discord-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 6px;
}

.discord-row a { font-family: Arial, sans-serif; font-size: 13px; color: #d8d4d4; }

.discord-icon { font-size: 12px; color: white; }

.green-text-main {
    color: #00ff88;
    opacity: 0;
    animation: fadeInOpacity 2s forwards;
}

.orbitron-text { font-family: 'Orbitron', sans-serif; font-size: 22px; }

.cairo-text { font-family: 'Cairo', sans-serif; font-size: 22px; }

@keyframes fadeInOpacity { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

<body>

<audio autoplay loop controls>
  <source src="audio/aa.mp3" type="audio/mpeg">
  متصفحك لا يدعم تشغيل الصوت.
</audio>

<div id="page1">
    <div class="page1-box">
        <h1>SECURITY ALERT Majara IN THE SYSTEM ..</h1>
        <p><a href="https://discord.gg/Bu" target="_blank">DISCORD.GG/Bu</a></p>
    </div>
</div>

<div id="page2" class="hidden">

    <div class="page2-bg"></div>

    <div class="top-left-panel">
        <div class="title-inline">JOIN TO DISCORD TO LEARN :</div>

        <div class="inner-box">
            <div class="green-text">how to be a cheater?</div>
        </div>

        <div class="panel-line"></div>

        <div class="discord-row">
            <i class="fa-brands fa-discord discord-icon"></i>
            <a href="https://discord.gg/Bu" target="_blank">discord.gg/Bu</a>
        </div>
    </div>

    <div class="image-box">
        <img src="https://media.discordapp.net/attachments/1467589883211026544/1487678409877491803/batman-movies.gif?ex=69ca03fc&is=69c8b27c&hm=a48e1c3faad19b66bd163c3f06c16911637e515711a04f01c9f5750e369a02cc&=&width=472&height=350">
    </div>

    <h1 class="big-title">HACKED BY Majara</h1>

    <div class="box-gray">

        <div class="top-bar">
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <a class="discord-link" href="https://discord.gg/Bu" target="_blank">
                discord.gg/Bu
            </a>
        </div>

        <div class="line"></div>

        <p>
          <span class="green-text-main orbitron-text">Majara :</span>
          <span class="green-text-main cairo-text">تست</span>
        </p>

    </div>

</div>

<script>
setTimeout(() => {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
}, 1000);
</script>

</body>
</html>
